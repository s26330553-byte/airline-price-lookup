<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>航司票價查詢</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    .fade-in { animation: fadeIn 0.25s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .shake { animation: shake 0.35s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- 密碼鎖 -->
  <div id="lockScreen" class="fixed inset-0 bg-slate-800/90 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-80 text-center">
      <div class="text-4xl mb-3">🔒</div>
      <h2 class="text-lg font-bold text-slate-800 mb-1">雄獅旅行社 RC 專用</h2>
      <p class="text-slate-500 text-sm mb-5">請輸入存取密碼</p>
      <input type="password" id="pwInput" placeholder="密碼"
        class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500 mb-3"
        onkeydown="if(event.key==='Enter')checkPassword()">
      <p id="pwError" class="text-red-500 text-sm mb-3 hidden">密碼錯誤，請再試一次</p>
      <button onclick="checkPassword()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition-all">
        進入
      </button>
    </div>
  </div>

  <div class="max-w-lg mx-auto px-4 py-8">

    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-slate-800">✈ 航司票價查詢</h1>
      <p class="text-slate-500 text-sm mt-1">雄獅旅行社 RC 專用 · 團體票含週末加價自動計算</p>
    </div>

    <!-- Airline Tabs -->
    <div class="flex gap-2 mb-4">
      <button id="tab-BR" onclick="switchTab('BR')"
        class="flex-1 py-2.5 rounded-xl font-semibold text-sm transition-all border-2 border-green-500 bg-green-500 text-white">
        長榮 BR
      </button>
      <button id="tab-CI" onclick="switchTab('CI')"
        class="flex-1 py-2.5 rounded-xl font-semibold text-sm transition-all border-2 border-slate-200 bg-white text-slate-600 hover:border-blue-400">
        中華 CI
      </button>
      <button id="tab-JX" disabled
        class="flex-1 py-2.5 rounded-xl font-semibold text-sm border-2 border-slate-100 bg-slate-50 text-slate-300 cursor-not-allowed">
        星宇 JX
      </button>
    </div>

    <!-- Search Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-4">
      <div class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">航班代碼</label>
          <input type="text" id="flightInput" placeholder="例：BR116、BR166、CI130" maxlength="10"
            class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-lg font-mono tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase"
            oninput="this.value=this.value.toUpperCase().replace(/\s/g,'')"
            onkeydown="if(event.key==='Enter')handleSearch()">
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">出發日期</label>
            <input type="date" id="dateInput"
              class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">行程天數</label>
            <select id="tripDaysInput"
              class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="4">4 天</option>
              <option value="5" selected>5 天（預設）</option>
              <option value="6">6 天</option>
              <option value="7">7 天</option>
              <option value="8">8 天</option>
            </select>
          </div>
        </div>

        <button onclick="handleSearch()"
          class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-semibold py-3 rounded-xl transition-all text-base shadow-sm">
          查詢票價
        </button>
      </div>
    </div>

    <!-- Result Area -->
    <div id="result"></div>

    <!-- Available Flights Info -->
    <div id="flightList" class="mt-4"></div>

    <!-- Footer -->
    <p class="text-center text-xs text-slate-400 mt-6" id="lastUpdated">資料載入中…</p>

  </div>

  <script>
    let PRICES = null;
    let activeTab = 'BR';

    // ── 資料載入 ──────────────────────────────────────────────
    async function loadPrices() {
      try {
        const res = await fetch('data/prices.json', { cache: 'no-cache' });
        PRICES = await res.json();
      } catch {
        document.getElementById('result').innerHTML = renderWarning(
          '請透過本機伺服器或 GitHub Pages 開啟此工具（直接雙擊 HTML 檔無法載入資料）。' +
          '<br>建議：在 VS Code 安裝 Live Server 套件，或上傳到 GitHub Pages 後使用。'
        );
        return;
      }
      document.getElementById('lastUpdated').textContent =
        `票價資料最後更新：${PRICES.lastUpdated}　·　僅供 RC 內部參考`;
      renderFlightList();
    }

    // ── 日期工具 ──────────────────────────────────────────────
    function parseLocalDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    // ── 航司 Tab 切換 ─────────────────────────────────────────
    function switchTab(airline) {
      activeTab = airline;
      const tabColors = { BR: 'green', CI: 'blue' };
      ['BR','CI'].forEach(a => {
        const btn = document.getElementById('tab-' + a);
        if (a === airline) {
          const c = tabColors[a] || 'blue';
          btn.className = `flex-1 py-2.5 rounded-xl font-semibold text-sm transition-all border-2 border-${c}-500 bg-${c}-500 text-white`;
        } else {
          btn.className = 'flex-1 py-2.5 rounded-xl font-semibold text-sm transition-all border-2 border-slate-200 bg-white text-slate-600 hover:border-blue-400';
        }
      });
      document.getElementById('result').innerHTML = '';
      renderFlightList();
    }

    // ── 路線搜尋（回傳所有相符的路線） ──────────────────────────
    function findRoutes(flight) {
      const f = flight.toUpperCase().replace(/\s/g, '');
      return PRICES.routes.filter(route =>
        (route.out || route.outbound || []).includes(f) ||
        (route.in || route.inbound || []).includes(f)
      );
    }

    // ── 票價查找 ──────────────────────────────────────────────
    // 支援新格式（compact p[] + drKey）與舊格式（priceSets）
    function findPriceForRoute(route, departureDateStr) {
      const d = parseLocalDate(departureDateStr);

      // 新格式：compact p[] + drKey
      if (route.p && route.drKey) {
        const dateRanges = PRICES.dateRanges[route.drKey];
        for (let i = 0; i < dateRanges.length; i++) {
          if (route.p[i] === null || route.p[i] === undefined) continue;
          for (const [start, end] of dateRanges[i]) {
            if (d >= parseLocalDate(start) && d <= parseLocalDate(end)) {
              return route.p[i];
            }
          }
        }
        return null;
      }

      // 舊格式：priceSets（未來 BR / JX 可能使用）
      if (route.priceSets) {
        const candidates = [];
        for (const ps of route.priceSets) {
          for (const range of ps.prices) {
            const s = parseLocalDate(range.start);
            const e = parseLocalDate(range.end);
            if (d >= s && d <= e) { candidates.push(range.price); break; }
          }
        }
        if (candidates.length === 0) return null;
        return Math.min(...candidates);
      }

      return null;
    }

    // ── 週末加價邏輯 ──────────────────────────────────────────
    function tripContainsBothWeekendDays(departureDateStr, tripDays) {
      const start = parseLocalDate(departureDateStr);
      let hasSat = false, hasSun = false;
      for (let i = 0; i < tripDays; i++) {
        const day = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i).getDay();
        if (day === 6) hasSat = true;
        if (day === 0) hasSun = true;
      }
      return hasSat && hasSun;
    }

    function checkSurchargeExemption(airline, destination, departureDateStr) {
      const exemptions = (airline.weekendExemptions || {})[destination] || [];
      const d = parseLocalDate(departureDateStr);
      for (const ex of exemptions) {
        if (d >= parseLocalDate(ex.start) && d <= parseLocalDate(ex.end)) {
          return { exempt: true, name: ex.name };
        }
      }
      return { exempt: false };
    }

    // ── 找出票價對應的 slot index ─────────────────────────────
    function findSlotIndex(route, departureDateStr) {
      const d = parseLocalDate(departureDateStr);
      if (route.drKey) {
        const dateRanges = PRICES.dateRanges[route.drKey];
        for (let i = 0; i < dateRanges.length; i++) {
          for (const [start, end] of dateRanges[i]) {
            if (d >= parseLocalDate(start) && d <= parseLocalDate(end)) return i;
          }
        }
      }
      return null;
    }

    // ── 主查詢（回傳所有相符路線的結果） ─────────────────────────
    function queryPrices(flightInput, departureDateStr, tripDays) {
      if (!PRICES) return { error: '資料尚未載入，請稍後再試' };

      const routes = findRoutes(flightInput);
      if (routes.length === 0) return {
        error: `找不到航班「${flightInput}」，請確認代碼是否正確（例：BR116、CI130）`
      };

      const results = [];

      for (const route of routes) {
        const airline = PRICES.airlines[route.airline];
        const dest = route.dest || route.destination;

        let basePrice = null;
        let isPromo = false;
        let sourceLabel = airline.defaultSource || airline.name;

        // datePrices 格式（BR 促銷票）
        if (route.datePrices) {
          const today = new Date(); today.setHours(0, 0, 0, 0);
          const tEnd = route.ticketingEnd ? parseLocalDate(route.ticketingEnd) : null;
          if (!tEnd || today <= tEnd) {
            for (const slot of route.datePrices) {
              if (slot.dates.includes(departureDateStr)) { basePrice = slot.price; break; }
            }
          }
          if (basePrice === null) continue;
          isPromo = true;
          sourceLabel = route.source || airline.name;
        } else {
        // 從 p[] 取正常票價，再疊加促銷（含開票期檢查）
        basePrice = findPriceForRoute(route, departureDateStr);
        if (route.promoSlots) {
          const slotIdx = findSlotIndex(route, departureDateStr);
          if (slotIdx !== null) {
            const promo = route.promoSlots[slotIdx];
            if (promo) {
              const today = new Date(); today.setHours(0, 0, 0, 0);
              const ticketingEnd = parseLocalDate(promo.ticketingEnd);
              if (today <= ticketingEnd && promo.price != null) {
                if (basePrice === null || promo.price < basePrice) basePrice = promo.price;
                isPromo = true;
                sourceLabel = promo.source;
              }
            }
          }
        }
        if (basePrice === null) continue;
        } // end else (p[] format)

        // 週末加價
        const hasWeekend = tripContainsBothWeekendDays(departureDateStr, tripDays);
        let surcharge = 0, surchargeNote = '', surchargeDetail = '';

        if (!hasWeekend) {
          surchargeNote = '免收';
          surchargeDetail = `行程 ${tripDays} 天未同時含週六及週日`;
        } else {
          const exemption = checkSurchargeExemption(airline, dest, departureDateStr);
          if (exemption.exempt) {
            surchargeNote = '免收（國定假日）';
            surchargeDetail = `出發日在「${exemption.name}」免收週末加價期間`;
          } else {
            const surchargeMap = airline.weekendSurcharge || {};
            surcharge = surchargeMap[dest] !== undefined ? surchargeMap[dest] : (surchargeMap.default || 0);
            surchargeNote = `+ NT$ ${surcharge.toLocaleString()}`;
            surchargeDetail = `行程含週六＋週日，${dest} 標準加價`;
          }
        }

        // 回程日
        const depDate = parseLocalDate(departureDateStr);
        const retDate = new Date(depDate.getFullYear(), depDate.getMonth(), depDate.getDate() + tripDays - 1);
        const retDateStr = `${retDate.getFullYear()}-${String(retDate.getMonth()+1).padStart(2,'0')}-${String(retDate.getDate()).padStart(2,'0')}`;

        const discount = airline.agentDiscount || 0;

        results.push({
          route, airline, dest,
          flightInput: flightInput.toUpperCase().replace(/\s/g, ''),
          departureDateStr, retDateStr, tripDays,
          basePrice, surcharge, surchargeNote, surchargeDetail,
          discount, isPromo, sourceLabel,
          total: basePrice + surcharge - discount
        });
      }

      if (results.length === 0) return {
        error: `航班「${flightInput}」在 ${departureDateStr} 無對應票價（可能已超出此航班的銷售區間）`
      };

      return { ok: true, results };
    }

    // ── UI ────────────────────────────────────────────────────
    const DAY_NAMES = ['日','一','二','三','四','五','六'];

    function fmtDate(str) {
      const d = parseLocalDate(str);
      return `${d.getMonth()+1}/${d.getDate()}（${DAY_NAMES[d.getDay()]}）`;
    }

    function fmtPrice(n) {
      return 'NT$ ' + n.toLocaleString();
    }

    function renderWarning(msg) {
      return `<div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-amber-800 text-sm leading-relaxed fade-in">⚠️ ${msg}</div>`;
    }

    function renderError(msg) {
      return `<div class="bg-red-50 border border-red-200 rounded-2xl p-4 text-red-700 text-sm fade-in">❌ ${msg}</div>`;
    }

    function renderResultCard(r) {
      const surchargeColor = r.surcharge > 0 ? 'text-orange-600' : 'text-slate-400';
      const totalColor = r.surcharge > 0 ? 'text-orange-700' : 'text-green-700';
      const surchargeTag = r.surcharge > 0
        ? `<span class="bg-orange-100 text-orange-700 text-xs px-2 py-0.5 rounded-full font-medium">含週末加價</span>`
        : `<span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-full font-medium">無週末加價</span>`;

      const tripTypeTag = r.route.tripType
        ? `<span class="bg-white/25 text-white/90 text-xs px-2 py-0.5 rounded-full ml-2">${r.route.tripType}</span>`
        : '';

      return `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden fade-in mb-3">
          <div class="bg-gradient-to-r from-blue-600 to-blue-500 text-white px-6 py-4">
            <div class="flex items-start justify-between">
              <div class="min-w-0 flex-1 pr-3">
                <div class="text-xl font-bold font-mono tracking-wide">${r.flightInput}${tripTypeTag}</div>
                <div class="text-blue-100 text-sm mt-0.5 leading-snug">${r.route.label}</div>
              </div>
              <div class="text-right flex-shrink-0">
                <div class="flex items-center justify-end gap-1.5">
                  <div class="text-blue-200 text-xs">${r.airline.name}</div>
                  ${r.isPromo ? `<span class="bg-orange-400 text-white text-xs px-2 py-0.5 rounded-full font-bold">促銷</span>` : ''}
                </div>
                <div class="mt-1">${surchargeTag}</div>
              </div>
            </div>
          </div>

          <div class="px-6 py-5">
            <div class="bg-slate-50 rounded-xl px-4 py-3 mb-5 text-sm text-slate-600 flex items-center justify-between">
              <div>
                <span class="font-medium">${fmtDate(r.departureDateStr)}</span>
                <span class="text-slate-400 mx-2">→</span>
                <span class="font-medium">${fmtDate(r.retDateStr)}</span>
              </div>
              <div class="text-slate-400 text-xs">${r.tripDays} 天</div>
            </div>

            <div class="space-y-3">
              <div class="flex justify-between items-center">
                <span class="text-slate-600">基本票價</span>
                <span class="font-semibold text-slate-800 text-lg">${fmtPrice(r.basePrice)}</span>
              </div>

              <div class="flex justify-between items-baseline ${surchargeColor}">
                <div>
                  <div>週末加價</div>
                  <div class="text-xs mt-0.5 text-slate-400">${r.surchargeDetail}</div>
                </div>
                <span class="font-medium text-base">${r.surchargeNote}</span>
              </div>

              ${r.discount > 0 ? `
              <div class="flex justify-between items-center text-emerald-600">
                <span>代理商折扣</span>
                <span class="font-medium">- NT$ ${r.discount.toLocaleString()}</span>
              </div>` : ''}

              <div class="border-t border-slate-200 pt-4 flex justify-between items-center">
                <span class="font-bold text-slate-800">最終票價</span>
                <span class="text-3xl font-bold ${totalColor}">${fmtPrice(r.total)}</span>
              </div>
              <p class="text-xs text-slate-400 text-right -mt-2">未含稅金及附加費用</p>
              <p class="text-xs text-right mt-1.5 ${r.isPromo ? 'text-orange-500 font-medium' : 'text-slate-400'}">票價來源：${r.sourceLabel}</p>
            </div>
          </div>
        </div>`;
    }

    function handleSearch() {
      const flight = document.getElementById('flightInput').value.trim();
      const date = document.getElementById('dateInput').value;
      const tripDays = parseInt(document.getElementById('tripDaysInput').value);
      const el = document.getElementById('result');

      if (!flight) { el.innerHTML = renderError('請輸入航班代碼'); return; }
      if (!date)   { el.innerHTML = renderError('請選擇出發日期'); return; }

      const q = queryPrices(flight, date, tripDays);
      if (!q.ok) { el.innerHTML = renderError(q.error); return; }

      const { results } = q;
      let html = '';

      if (results.length > 1) {
        html += `<div class="text-xs text-slate-500 mb-2 px-1">找到 ${results.length} 個包含 ${flight.toUpperCase()} 的行程組合</div>`;
      }

      html += results.map(renderResultCard).join('');
      el.innerHTML = html;
    }

    // ── 可查詢航班清單（按目的地分組，僅顯示去程班號） ────────────
    function renderFlightList() {
      if (!PRICES || !PRICES.routes.length) return;

      const destNames = {
        NRT: '東京（成田）', NGO: '名古屋', CTS: '札幌（新千歲）',
        KIX: '大阪（關西）', TAK: '高松', HIJ: '廣島',
        FUK: '福岡', KMJ: '熊本', KOJ: '鹿兒島', OKA: '沖繩',
        SDJ: '仙台', AOJ: '青森', KMQ: '小松', MYJ: '松山（愛媛）',
        UKB: '神戶（UKB）', ICN: '首爾（仁川）', GMP: '首爾（金浦）'
      };
      const destOrderCI = ['NRT','NGO','CTS','KIX','TAK','HIJ','FUK','KMJ','KOJ','OKA'];
      const destOrderBR = ['SDJ','AOJ','CTS','NRT','KMQ','MYJ','KIX','FUK','OKA','UKB','ICN','GMP'];

      // 依目的地整理唯一出發航班（只顯示當前 Tab 的航司）
      const groups = {};
      for (const r of PRICES.routes) {
        if (r.airline !== activeTab) continue;
        const dest = r.dest || r.destination || '其他';
        if (!groups[dest]) groups[dest] = new Set();
        (r.out || r.outbound || []).forEach(f => groups[dest].add(f));
      }

      const destOrder = activeTab === 'BR' ? destOrderBR : destOrderCI;
      const items = destOrder
        .filter(dest => groups[dest] && groups[dest].size > 0)
        .map(dest => {
          const name = destNames[dest] || dest;
          const tags = [...groups[dest]].sort().map(f =>
            `<button type="button"
              class="bg-white border border-slate-200 rounded-lg px-2.5 py-1 text-xs font-mono text-slate-700 shadow-sm hover:bg-blue-50 hover:border-blue-400 hover:text-blue-700 transition-colors"
              onclick="document.getElementById('flightInput').value='${f}';document.getElementById('flightInput').focus()"
            >${f}</button>`
          ).join('');
          return `
            <div class="mb-3 last:mb-0">
              <div class="text-xs text-slate-400 mb-1.5">${name}</div>
              <div class="flex flex-wrap gap-1.5">${tags}</div>
            </div>`;
        }).join('');

      document.getElementById('flightList').innerHTML = `
        <div class="bg-white rounded-2xl border border-slate-200 p-4">
          <div class="text-xs font-medium text-slate-500 mb-3">可查詢去程班號（點選自動填入）</div>
          ${items}
        </div>`;
    }

    // ── 密碼鎖 ────────────────────────────────────────────────
    const PW = '750704';

    function checkPassword() {
      const input = document.getElementById('pwInput').value;
      if (input === PW) {
        sessionStorage.setItem('rc_auth', '1');
        document.getElementById('lockScreen').style.display = 'none';
      } else {
        const box = document.getElementById('pwInput');
        const err = document.getElementById('pwError');
        err.classList.remove('hidden');
        box.value = '';
        box.classList.add('shake');
        box.addEventListener('animationend', () => box.classList.remove('shake'), { once: true });
      }
    }

    if (sessionStorage.getItem('rc_auth') === '1') {
      document.getElementById('lockScreen').style.display = 'none';
    } else {
      setTimeout(() => document.getElementById('pwInput').focus(), 100);
    }

    // 預設日期為今天
    document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

    loadPrices();
  </script>
</body>
</html>
